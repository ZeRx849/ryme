<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى شهندة ❤️</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #fff0f3;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffafbd, #ffc3a0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #333;
        }
        #main-container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 2;
        }
        h1 { color: var(--primary-color); }
        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn:hover { transform: scale(1.05); background: #ff758f; }
        .question-box { display: none; }
        input[type="text"] {
            width: 85%;
            padding: 12px;
            margin-top: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            font-size: 1rem;
        }
        #video-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 10;
        }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="sora.mp3" loop></audio>

    <div id="main-container">
        <div id="start-screen">
            <h1>مرحبا بعينيا شهندة ❤️</h1>
            <p>اضغطي على الزر وأجيبي بصراحة ...</p>
            <button class="btn" onclick="startExperience()">دخول</button>
        </div>

        <div id="quiz-container" class="question-box">
            <h3 id="question-text">السؤال يظهر هنا</h3>
            <input type="text" id="answer-input" placeholder="اكتبي إجابتك هنا...">
            <br>
            <button class="btn" onclick="nextQuestion()">السؤال التالي</button>
            <p id="progress" style="font-size: 0.8rem; margin-top: 10px; color: #888;"></p>
        </div>
    </div>

    <div id="video-container">
        <video id="endVideo" src="sora.mp4" controls></video>
    </div>

    <script>
        const questions = [
            // 10 عن حياتها وطموحاتها
            "ما هو أكبر حلم تسعين لتحقيقه حالياً؟",
            "ما هو المكان الذي تتمنين زيارته والعيش فيه؟",
            "ما هو الشيء الذي يجعلك فخورة بنفسك دائماً؟",
            "كيف تحبين قضاء وقت فراغك المثالي؟",
            "ما هي الهواية التي تتمنين احترافها؟",
            "ما هو اللون الذي يمثل شخصيتك ولماذا؟",
            "إذا أتيحت لك فرصة لتغيير شيء واحد في العالم، ماذا سيكون؟",
            "ما هو أكثر نوع من الموسيقى أو الكتب يلامس روحك؟",
            "أين ترين نفسك بعد 5 سنوات من الآن؟",
            "ما هي الأكلة التي تسعد قلبك فوراً؟",
            // 5 عن الرومانسية
            "بالنسبة لكِ، ما هو تعريف الحب الحقيقي؟",
            "ما هي لغتك المفضلة في التعبير عن الحب؟",
            "ما هي الصفة التي تجعل العلاقة تدوم للأبد برأيك؟",
            "هل تؤمنين بوجود توأم الروح؟",
            "ما هي أجمل ذكرى عاطفية مرت عليكِ؟",
            // 5 عن ضرار
            "ما هو أول انطباع أخذتيه عن ضرار؟",
            "ما هي أكثر صفة يحبها ضرار فيكِ وتلاحظينها؟",
            "كلمة واحدة تصفين بها وجود ضرار في حياتك؟",
            "ما هو الشيء الذي يفعله ضرار ويجعلك تبتسمين تلقائياً؟",
            "لو أردتِ توجيه نصيحة لضرار ليصبح أفضل، ماذا ستقولين؟",
            // السؤال الأخير
            "لماذا ضرار يحسك مكيش واثقة فيه؟ 🙂"
        ];

        let currentStep = 0;
        let answers = [];
        
        // بيانات التلجرام الخاصة بك
        const telegramToken = "8690320289:AAHj93IeBs4j3nZzZMf7qYf4GQI6YU-k8Pk"; 
        const chatId = "6435779303";

        function startExperience() {
            document.getElementById('bgMusic').play().catch(e => console.log("Music play blocked"));
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('question-text').innerText = questions[currentStep];
            document.getElementById('answer-input').value = "";
            document.getElementById('progress').innerText = `سؤال ${currentStep + 1} من ${questions.length}`;
            document.getElementById('answer-input').focus();
        }

        function nextQuestion() {
            let ans = document.getElementById('answer-input').value;
            if(ans.trim() === "") {
                alert("من فضلكِ أجيبي على السؤال ❤️");
                return;
            }
            
            answers.push(`🔸 ${questions[currentStep]}\n🔹 الإجابة: ${ans}`);
            currentStep++;

            if (currentStep < questions.length) {
                showQuestion();
            } else {
                finishAndSend();
            }
        }

        function finishAndSend() {
            let finalMessage = "📝 إجابات شهندة الجديدة:\n\n" + answers.join("\n\n");
            
            fetch(`https://api.telegram.org/bot${telegramToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: finalMessage
                })
            }).then(() => {
                showVideo();
            }).catch(err => {
                console.error("خطأ في الإرسال:", err);
                showVideo();
            });
        }

        function showVideo() {
            document.getElementById('bgMusic').pause();
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            let vid = document.getElementById('endVideo');
            vid.play();
        }
    </script>
</body>
</html>
